server:
  port: 8082

spring:
  application:
    name: catalog-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://sigepid:sigepid_secret@localhost:27017/sigepid_catalog?authSource=admin}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
