server:
  port: 8080

spring:
  application:
    name: api-gateway
  main:
    web-application-type: reactive
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**

        - id: catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/catalog/**

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**

        - id: notification-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/notifications/**

eureka:
  client:
    enabled: false

jwt:
  secret: SiGePID_SuperSecretKey_ChangeInProduction_2024

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    gateway:
      enabled: true

logging:
  level:
    com.sigepid.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
