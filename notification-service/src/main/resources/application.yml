# ========================
# Configuración del Microservicio de Notificaciones
# ========================

server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: notification-service

  # Configuración del servidor SMTP para envío de correos electrónicos
  # Las credenciales se leen de variables de entorno (MAIL_USERNAME, MAIL_PASSWORD)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
